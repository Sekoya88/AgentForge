name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: agentforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge -d agentforge"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: Migrate
        env:
          DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/agentforge
        run: python -m alembic upgrade head
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/agentforge
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-min-32-characters-long
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
